<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1'><title>Tracewright Uncertainty Map Demo</title><style>:root{--paper:#f7f3eb;--panel:#fffdf8;--ink:#202124;--muted:#6b6258;--line:#d9d0c3;--accent:#315f72;--blue:#d7e3f5;--green:#dcebd9;--yellow:#f5e8bd;--orange:#f3cfaa;--gray:#e7e3dd;--red:#efd0c8}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:Segoe UI,system-ui,sans-serif;line-height:1.45}.shell{display:grid;grid-template-columns:320px 1fr;min-height:100vh}aside{padding:28px 22px;background:#ece5d9;border-right:1px solid var(--line)}main{padding:32px;max-width:1220px}h1,h2,h3,p{margin-top:0}h1{font-size:28px;line-height:1.1}.kicker{margin:0 0 8px;color:var(--accent);font-size:12px;font-weight:800;text-transform:uppercase}.notice,.overview{border-left:4px solid var(--accent);background:#dcecf0;padding:14px 16px;margin:18px 0;line-height:1.55}.case-list,.stack{display:grid;gap:12px}.case-button{width:100%;border:1px solid var(--line);border-radius:8px;background:rgba(255,253,248,.75);padding:14px;text-align:left;cursor:pointer}.case-button.active{border-color:var(--accent);background:var(--panel)}.case-button span{display:block;margin-top:4px;color:var(--muted);font-size:13px}.header{display:flex;justify-content:space-between;gap:16px;margin-bottom:14px}.status{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.tag,.flag{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:999px;min-height:28px;padding:5px 10px;background:var(--panel);color:var(--muted);font-size:12px;font-weight:700}.green{background:var(--green)}.yellow{background:var(--yellow)}.orange{background:var(--orange)}.blue{background:var(--blue)}.gray{background:var(--gray)}.red{background:var(--red)}.tabs{display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--line);margin-bottom:16px}.tab{border:1px solid transparent;border-bottom:0;border-radius:8px 8px 0 0;background:transparent;padding:10px 14px;color:var(--muted);cursor:pointer}.tab.active{border-color:var(--line);background:var(--panel);color:var(--ink)}.view{display:none}.view.active{display:block}.panel,.card{border:1px solid var(--line);border-radius:8px;background:var(--panel);box-shadow:0 8px 18px rgba(35,31,26,.05)}.panel,.body{padding:18px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.tri{grid-template-columns:repeat(3,minmax(0,1fr))}.overview-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.overview-grid article{border-right:1px solid rgba(49,95,114,.2);padding-right:12px}.overview-grid article:last-child{border-right:0}.overview-grid span{display:block;color:var(--accent);font-size:12px;font-weight:800;text-transform:uppercase}.overview-note{margin-bottom:0;font-weight:700}.guide-layout{display:grid;grid-template-columns:minmax(0,1.45fr) minmax(260px,.55fr);gap:14px}.attention-panel,.legend-panel{border:1px solid var(--line);border-radius:8px;background:#fbf8f1;padding:14px}.bar{display:grid;grid-template-columns:180px 1fr 54px;gap:10px;align-items:center;margin:8px 0}.track{height:10px;border-radius:999px;background:#ece5d9;overflow:hidden}.fill{height:100%;border-radius:999px}.fill.review{background:#af6e4d}.fill.mediated{background:#567ca0}.fill.anchor{background:#62835f}.fill.claims{background:#b79b49}.defs{display:grid;gap:8px;margin:10px 0 16px;color:var(--muted);font-size:14px}.defs p{margin-bottom:0}.legend-item p{margin:6px 0 0;color:var(--muted);font-size:13px}.focus-list{display:grid;gap:10px}.focus-item{border:1px solid var(--line);border-radius:8px;background:#fbf8f1;padding:12px}.text-button{border:1px solid var(--line);border-radius:8px;background:var(--panel);padding:8px 12px;color:var(--accent);font-weight:700;cursor:pointer}.screening-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.guide{margin:8px 0 0;padding-left:20px;line-height:1.6}.message{display:grid;grid-template-columns:190px 1fr}.message.context{background:#f2f0ec;border-style:dashed;opacity:.82}.meta{padding:18px;border-right:1px solid var(--line);background:rgba(236,229,217,.5)}.flag-row{display:flex;gap:8px;flex-wrap:wrap}blockquote{margin:0 0 14px;border-left:4px solid var(--accent);background:#f4efe5;padding:14px 16px;line-height:1.6}.marked{margin:14px 0;border:1px solid var(--line);border-radius:8px;background:#fffaf0;padding:14px}.mark{display:grid;grid-template-columns:180px 170px 1fr;gap:10px;margin-top:10px}code{background:var(--orange);border-radius:6px;padding:4px 7px;white-space:normal}.box{border:1px solid var(--line);border-radius:8px;background:#fbf8f1;padding:14px}.table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid var(--line);padding:12px;text-align:left;vertical-align:top}.table th{color:var(--muted);font-size:12px;text-transform:uppercase}@media(max-width:980px){.shell,.message,.grid,.tri,.mark,.overview-grid,.guide-layout,.screening-grid{grid-template-columns:1fr}main{padding:22px}aside{border-right:0;border-bottom:1px solid var(--line)}.bar{grid-template-columns:1fr}.header{display:block}.status{justify-content:flex-start}}</style></head><body><div class='shell'><aside><p class='kicker'>Tracewright Demo</p><h1>Uncertainty Map</h1><div class='notice'><strong>This is not an AI detector.</strong><br>Tracewright is not designed to expose people. It is designed to slow down premature judgment. All cases below are synthetic review materials.</div><div id='caseList' class='case-list'></div></aside><main><header class='header'><div><p class='kicker' id='stage'>Demo case</p><h2 id='name'>Case</h2></div><div class='status'><span id='count' class='tag'>0 materials</span><span id='level' class='tag'>Review posture</span></div></header><nav class='tabs'><button class='tab active' data-view='summary'>Summary</button><button class='tab' data-view='timeline'>Timeline</button><button class='tab' data-view='claims'>Claims</button><button class='tab' data-view='evidence'>Evidence</button><button class='tab' data-view='sources'>Synthetic Source Inventory</button></nav><section id='summary' class='view active'></section><section id='timeline' class='view'></section><section id='claims' class='view'></section><section id='evidence' class='view'></section><section id='sources' class='view'></section></main></div><script>const cases=[{id:'baseline',name:'Case A: Self-Written Baseline',stage:'Personal correspondence',level:'Baseline-like pattern',intuition:'The correspondent appears to write directly, with light or no tool support.',overview:'Strong response alignment, stable claims, concrete callbacks, and small local imperfections support a self-written or lightly checked reading.',posture:'Use as a reading baseline, not as proof. The point is to map evidence, not to certify authorship.',screening:['Baseline reference','Medium: three synthetic messages only','Synthetic demo data; no real private letter included.','Shows what stable human texture can look like.','Medium if treated as a universal standard.'],guide:{texture:[4,1,5],lanes:[2,2,1,5,'Low'],focus:[['green','C001','Authorship / mediation','Human texture','Small unpolished phrasing remains visible while the reply still answers the context directly.'],['green','C002','Claim reliability','Continuity','The second reply naturally reuses earlier details.']]},checks:['Collect more letters.','Check whether small irregularities persist.','Avoid using this as a rigid normal.'],claims:[['Works in a local technical business.','Verifiable background claim','First appeared','Stable'],['Learned Japanese for personal reasons.','Self-history claim','Repeated with detail','Stable'],['May use grammar checking.','Tool-use possibility','Unknown','Ask only if relevant']],materials:[['A001','Reviewer / context','context','2026-04-01','synthetic:A001','The reviewer asks about local work, music, and language learning.',['Context only']],['C001','Correspondent / target','target','2026-04-03','synthetic:C001','The correspondent answers directly, gives concrete work details, and asks a specific return question.',['Stable','Direct response','Human texture']],['C002','Correspondent / target','target','2026-04-10','synthetic:C002','The second reply reuses earlier details naturally and keeps the same uneven but fluent style.',['Continuity','Stable style']]],evidence:[['Human Texture','green','synthetic:C001','I tried to explain it better, but maybe I make the sentence too long...',[['make the sentence too long','non-native phrasing','A small local irregularity remains in an otherwise clear sentence.']],['The phrase is clear but not polished flat.','The writer process is visible.','This supports human texture but does not prove authorship.'],['A tool could preserve original phrasing.','A non-native writer may also use grammar checking.']]]},{id:'mixed',name:'Case B: Mixed Authorship / AI-Polish',stage:'Correspondence plus domain content',level:'Segment-level review recommended',intuition:'Short domain-specific parts feel personal; longer reflective passages feel polished.',overview:'Operational domain details remain grounded, while longer reflective passages show editorial or AI-polish signals.',posture:'Avoid one label for the whole person. Separate domain turns, emotional response, and polished prose.',screening:['Segment-level review','Medium-high','Synthetic demo data.','Shows why mixed-composition analysis matters.','High if the polished passage is used to judge every message.'],guide:{texture:[3,4,5],lanes:[4,2,2,5,'High'],focus:[['blue','C001','Authorship / mediation','AI / editorial polish','The reflective sentence is compact, balanced, and more polished than the operational material.'],['green','C001','Claim reliability','Domain anchor','The chess correction should be reviewed separately from the literary surface.']]},checks:['Compare short and long segments.','Ask drafting workflow naturally.','Preserve domain-specific evidence separately.'],claims:[['The chess correction follows the current board state.','Domain claim','Source-grounded','Stable'],['The literary interpretation is polished and general.','Style observation','Segment-specific','Review'],['Different segments may have different creation histories.','Mediation hypothesis','Plausible','Do not overclaim']],materials:[['A001','Reviewer / context','context','2026-04-05','synthetic:A001','The reviewer asks about a novel and continues a slow chess game.',['Context only']],['C001','Correspondent / target','target','2026-04-06','synthetic:C001','The reply contains a precise chess correction and a polished literary reflection.',['Domain anchor','AI/editorial polish?','Segment split']]],evidence:[['AI / Editorial Polish','blue','synthetic:C001','The refuge becomes a quiet cage, a poetic punishment for refusing growth.',[['quiet cage','aphoristic polish','Compact literary metaphor.'],['poetic punishment','balanced evaluative phrase','Smooth review-like cadence.']],['The prose is more polished than earlier operational messages.','The same message also contains domain-specific handling.','This supports a mixed-composition hypothesis.'],['Careful human drafting.','Human prose edited by AI.','AI-generated reflection plus personal insertion.']],['Domain Authorship Anchor','green','synthetic:C001','You wrote Nd2, but from this position I think you meant Nbd2.',[['Nbd2','domain-specific correction','Requires tracking the game state.']],['The correction is operational and specific.','It differs from the polished literary cadence.','Analyze it separately from the prose surface.'],['A domain tool could assist, but no evidence requires that.']]]},{id:'newsletter',name:'Case C: Institutional Newsletter',stage:'Public document',level:'Multiple plausible explanations',intuition:'No reader intuition supplied. Blind review mode.',overview:'The document appears source-rich and institutionally edited. Final English may include translation, editorial smoothing, or AI assistance.',posture:'Separate source provenance, fact-checking, cross-language surface, and final prose polish.',screening:['Workflow review','Medium','Synthetic demo data modeled as a public newsletter.','Shows how this method can extend beyond personal letters.','High if polished institutional English is treated as AI authorship.'],guide:{texture:[3,3,5],lanes:[3,4,3,5,'Moderate'],focus:[['green','D001','Claim reliability','Source-backed specificity','Material details point to a source layer that should be kept separate from the final prose layer.'],['yellow','D001','Authorship / mediation','Low-confidence surface signal','Formal collocations are weak clues without workflow evidence.']]},checks:['Compare source notes and final article.','Ask whether translation or AI tools were used.','Fact-check claims separately.'],claims:[['The cassette contains two platform versions.','Material fact','Source-backed','Verify with archive record'],['The materials are available for consultation.','Access claim','Public-facing','Verify'],['Final English may hide source-language workflow.','Method caution','Low-confidence','Use provenance evidence']],materials:[['D001','Document / target','target','2026-04-20','synthetic:D001','A public newsletter combines archive object metadata, historical framing, and a polished support appeal.',['Institutional template','Archive specificity','Editorial polish']]],evidence:[['Source-Backed Specificity','green','synthetic:D001','The original cassette contains two platform versions on opposite sides, catalogued under the same acquisition record.',[['opposite sides','material detail','Physical-object detail suggests source notes or archive knowledge.'],['acquisition record','provenance cue','Links final prose to archival practice.']],['The detail is too specific for generic promotional prose.','It may come from human notes later edited or translated.','Source layer and sentence layer should be separated.'],['A well-prompted AI could rewrite supplied source notes.']],['Low-Confidence Surface Signal','yellow','synthetic:D001','These materials served for the preparation of this article and are available for consultation.',[['served for the preparation','collocation heaviness','Possible translation or institutional English; low confidence.'],['available for consultation','formal register','Could be human institutional phrasing.']],['Final English is clean enough that source language is not detectable with confidence.','Small collocation clues are weak alone.','Workflow evidence matters more than surface guessing.'],['Human non-native English.','Human translation.','LLM translation plus human check.','Institutional style.']]]},{id:'academic',name:'Case D: Academic Paper Review',stage:'Research article',level:'Claim-level verification recommended',intuition:'No reader intuition supplied. Blind review mode.',overview:'The paper has a coherent scholarly surface, but several claims require source-level verification before the argument should be relied on.',posture:'Separate prose polish from research reliability. A fluent academic surface can coexist with weak methods, unsupported citations, or overgeneralized conclusions.',screening:['Claim-level verification before citation or reuse','Medium: abstract, method excerpt, and conclusion excerpt only','Synthetic demo paper; no real unpublished manuscript included.','Shows how the same framework can review academic material without reducing it to authorship.','High if polished prose is mistaken for methodological strength.'],guide:{texture:[2,3,5],lanes:[2,5,1,5,'High'],focus:[['orange','P002','Claim reliability','Method specificity gap','The sample and coding procedure are not detailed enough to carry the conclusion.'],['orange','P003','Claim reliability','Overgeneralization risk','A limited corpus is used to make a broad institutional workflow claim.'],['blue','P001','Authorship / mediation','Polished academic surface','The prose is smooth, but that is secondary to evidence support.']]},checks:['Trace each quantitative claim to method and table support.','Check whether cited studies actually support the operational definition.','Ask for dataset, inclusion criteria, and coding protocol.'],claims:[['The study uses a 42-document corpus.','Method claim','Partially specified','Verify sampling protocol'],['The proposed review workflow improved analyst accuracy by 31%.','Quantitative result','Requires table support','Verify'],['The findings generalize to institutional workflows.','Scope claim','Overextended from excerpt','Review'],['Prior studies establish the same operational definition of narrative provenance.','Citation claim','Citation support unknown','Verify cited sources']],materials:[['P001','Paper / abstract','target','2026-05-02','synthetic:P001','The abstract introduces a narrative-provenance review method and reports improved analyst performance.',['Scholarly surface','Quantitative claim','Claim review']],['P002','Paper / methods','target','2026-05-02','synthetic:P002','The methods section describes a 42-document corpus but gives limited sampling and coding detail.',['Method gap','Verify dataset']],['P003','Paper / conclusion','target','2026-05-02','synthetic:P003','The conclusion generalizes from the limited corpus to institutional review workflows.',['Scope expansion','Review']]],evidence:[['Method Specificity Gap','orange','synthetic:P002','We selected forty-two documents representative of the field and coded them for provenance ambiguity.',[['representative of the field','sampling claim','The population and selection method are not defined.'],['coded them','method compression','No coder count, codebook, or agreement metric is visible in the excerpt.']],['The sentence makes a methodological claim but leaves the sampling frame underspecified.','The reader cannot yet tell whether the corpus supports the result.','This is a claim-reliability issue, not an authorship judgment.'],['Details may appear elsewhere in the paper.','Supplementary materials may contain the protocol.','This may be an excerpt-level limitation.']],['Overgeneralization Risk','orange','synthetic:P003','These results demonstrate that narrative-provenance mapping can improve institutional review workflows across domains.',[['demonstrate','strong causal verb','The excerpt supports caution better than proof.'],['across domains','scope expansion','The claim reaches beyond the visible corpus description.']],['The conclusion uses stronger language than the visible method supports.','This should prompt source and scope review before citation.','The issue is evidential strength rather than whether the prose is human or AI-written.'],['The full paper may include cross-domain validation.','The authors may be using demonstration in a softer rhetorical sense.']],['Citation Support Check','yellow','synthetic:P001','Prior work has established narrative provenance as a stable operational category.',[['established','citation strength','A broad literature claim needs source-level checking.'],['stable operational category','definition claim','The definition may vary across fields.']],['The phrase signals a literature-foundation claim.','A reviewer should inspect whether the cited sources actually use the same definition.','This belongs in the claim lane even if the writing style is polished.'],['The literature review may define the term carefully later.','The abstract may compress a nuanced discussion.']]]}];let selected=cases[0].id,view='summary';const $=s=>document.querySelector(s),esc=v=>String(v).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll(`'`,'&#039;');function cur(){return cases.find(c=>c.id===selected)}function render(){list();head();viewRender()}function list(){$('#caseList').innerHTML=cases.map(c=>`<button class='case-button ${c.id===selected?'active':''}' data-case='${esc(c.id)}'><strong>${esc(c.name)}</strong><span>${esc(c.level)}</span></button>`).join('')}function head(){const c=cur();$('#stage').textContent=c.stage;$('#name').textContent=c.name;$('#count').textContent=c.materials.length+' review materials';$('#level').textContent=c.level}function viewRender(){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===view));$('#'+view).classList.add('active');({summary,timeline,claims,evidence,sources}[view])()}function summary(){const c=cur(),g=c.guide;$('#summary').innerHTML=`<div class='stack'><section class='overview'><h3>Summary</h3><div class='overview-grid'>${cell('Reader intuition',c.intuition)}${cell('Analysis overview',c.overview)}${cell('Uncertainty posture',c.posture)}</div><p class='overview-note'>Tracewright is not designed to expose people. It is designed to slow down premature judgment.</p></section><section class='panel'><h3>Review Guide</h3><p class='defs'>This is an attention guide, not an AI probability score. It shows where review effort should go first.</p><div class='guide-layout'><div class='attention-panel'><h3>Texture Axes</h3><p class='defs'>These are evidence-card counts and review cues, not authenticity percentages.</p>${bar('Human / source texture',g.texture[0],g.texture[2],'anchor')}${bar('Machine / editorial cleanliness',g.texture[1],g.texture[2],'mediated')}<div class='defs'><p><strong>Human / source texture:</strong> visible writerly agency, specific source detail, revision traces, hesitation, local judgment, rough edges, or idiosyncratic phrasing.</p><p><strong>Machine / editorial cleanliness:</strong> automated-synthesis or editorial surface: clean coverage, weak close reading, template flow, fast generalization, or polished prose without visible ownership.</p></div><h3>Review Lanes</h3><p class='defs'>These counts show what kind of question the evidence cards answer.</p>${bar('Authorship / mediation',g.lanes[0],g.lanes[3],'mediated')}${bar('Claim reliability',g.lanes[1],g.lanes[3],'claims')}${bar('Disclosure / provenance',g.lanes[2],g.lanes[3],'anchor')}<div class='bar'><span>Review pressure</span><span class='flag ${pressure(g.lanes[4])}'>${esc(g.lanes[4])}</span><strong></strong></div><div class='defs'><p><strong>Authorship / mediation:</strong> who shaped wording, style, continuity, translation, and final surface.</p><p><strong>Claim reliability:</strong> whether stated facts, timelines, methods, identities, citations, or content claims need checking.</p><p><strong>Disclosure / provenance:</strong> explicit or known information about AI use, translation, edits, source notes, or workflow.</p></div><button class='text-button' data-view='evidence'>Open Evidence</button> <button class='text-button' data-view='claims'>Open Claims</button> <button class='text-button' data-view='sources'>Open Review Materials</button></div><div class='legend-panel'><h3>Flag Legend</h3>${legend('green','Stable / anchored','Continuity, source detail, or baseline-like texture.')}${legend('yellow','Observe','Weak or ambiguous signal; keep watching.')}${legend('blue','Mediated layer','Translation, AI polish, workflow, or layer separation.')}${legend('orange','Review','Meaning shift, weak support, strong tool involvement, or boundary issue.')}${legend('red','High attention','Known heavy AI composition, major mismatch, or severe claim problem.')}</div></div><h3>First Places To Inspect</h3><div class='focus-list'>${g.focus.map(f=>`<div class='focus-item'><span class='flag ${f[0]}'>${esc(f[1])}</span><p><strong>${esc(f[2])}:</strong> ${esc(f[3])} - ${esc(f[4])}</p></div>`).join('')}</div></section><section class='screening-grid'>${['Recommended action','Evidence completeness','Known provenance','Blind-reading value','Overclaim risk'].map((l,i)=>`<div class='panel'><p class='kicker'>${l}</p><p>${esc(c.screening[i])}</p></div>`).join('')}<div class='panel'><h3>Next Checks</h3><ul class='guide'>${c.checks.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div></section></div>`}function cell(l,v){return `<article><span>${esc(l)}</span><p>${esc(v)}</p></article>`}function bar(l,n,t,cls){return `<div class='bar'><span>${esc(l)}</span><div class='track'><div class='fill ${cls}' style='width:${Math.max(0,Math.min(100,n/t*100))}%'></div></div><strong>${n}/${t}</strong></div>`}function pressure(x){return x==='High'?'orange':x==='Moderate'?'yellow':'green'}function legend(a,b,c){return `<div class='legend-item'><span class='flag ${a}'>${esc(b)}</span><p>${esc(c)}</p></div>`}function timeline(){const c=cur();$('#timeline').innerHTML='<div class=stack>'+c.materials.map(m=>`<article class='card message ${m[2]==='context'?'context':''}'><div class=meta><strong>${esc(m[0])}</strong><br><span>${esc(m[1])}</span><br><span>${esc(m[3])}</span><br><span>${esc(m[4])}</span></div><div class=body><p>${esc(m[5])}</p><div class=flag-row>${m[6].map(f=>`<span class='flag ${m[2]==='context'?'gray':'green'}'>${esc(f)}</span>`).join('')}</div></div></article>`).join('')+'</div>'}function claims(){const c=cur();$('#claims').innerHTML=`<section class=panel><h3>Claim Map</h3><table class=table><thead><tr><th>Claim / Observation</th><th>Type</th><th>Status</th><th>Review Posture</th></tr></thead><tbody>${c.claims.map(r=>`<tr><td>${esc(r[0])}</td><td>${esc(r[1])}</td><td>${esc(r[2])}</td><td><span class='flag ${/Verify|Review|Overextended/i.test(r[3])?'yellow':'green'}'>${esc(r[3])}</span></td></tr>`).join('')}</tbody></table></section>`}function evidence(){const c=cur();$('#evidence').innerHTML='<div class=stack>'+c.evidence.map(e=>`<article class='card body'><div><span class=tag>${esc(e[2])}</span><h3>${esc(e[0])}</h3><span class='flag ${e[1]}'>${esc(e[1])}</span></div><blockquote>${esc(e[3])}</blockquote><section class=marked><p class=kicker>Marked Text</p>${e[4].map(m=>`<div class=mark><code>${esc(m[0])}</code><span>${esc(m[1])}</span><p>${esc(m[2])}</p></div>`).join('')}</section><div class=grid><section class=box><h3>Reasoning Chain</h3><ol>${e[5].map(x=>`<li>${esc(x)}</li>`).join('')}</ol></section><section class=box><h3>Alternative Explanations</h3><ul>${e[6].map(x=>`<li>${esc(x)}</li>`).join('')}</ul></section></div></article>`).join('')+'</div>'}function sources(){const c=cur();$('#sources').innerHTML=`<section class=panel><h3>Synthetic Source Inventory</h3><table class=table><thead><tr><th>ID</th><th>Role</th><th>Date</th><th>Demo Source ID</th><th>Summary</th></tr></thead><tbody>${c.materials.map(m=>`<tr><td>${esc(m[0])}</td><td>${esc(m[1])}</td><td>${esc(m[3])}</td><td>${esc(m[4])}</td><td>${esc(m[5])}</td></tr>`).join('')}</tbody></table></section>`}document.addEventListener('click',e=>{const c=e.target.closest('[data-case]');if(c){selected=c.dataset.case;view='summary';render();return}const t=e.target.closest('[data-view]');if(t){view=t.dataset.view;viewRender()}});render();</script></body></html>
